<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
@page { size: A4 portrait; margin: 1.5cm; }
body { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 10px; color: #222; }
.title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
.date { font-size: 11px; color: #666; margin-bottom: 12px; }
.section-title { font-size: 13px; font-weight: bold; margin: 10px 0 4px 0; color: #1a1a1a; border-bottom: 2px solid #333; padding-bottom: 3px; }
.item-box { border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; margin-bottom: 6px; background: #fafafa; }
.item-name { font-weight: bold; font-size: 10px; }
.item-sub { color: #666; font-size: 9px; }
.item-line { padding: 2px 0; font-size: 9.5px; border-bottom: 1px dotted #eee; }
.item-line .qty { float: right; font-weight: bold; }
.page-break { page-break-before: always; }
table { width: 100%; border-collapse: collapse; }
th { background: #2c2c2c; color: #fff; padding: 4px; font-size: 9px; text-align: left; }
td { padding: 3px 4px; border-bottom: 1px solid #eee; font-size: 9.5px; }
td.r { text-align: right; }
</style>
</head>
<body>
<div class="title">{TITLE}</div>
<div class="date">{FECHA}</div>
{MODULE_CONTENT}
</body>
</html>
